<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo House - Inventory</title>
    <style>
        /* Base Styles */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        h1 { text-align: center; color: #d35400; margin-bottom: 5px; font-size: 1.8rem; }
        
        /* Auth Styles */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .google-btn { background: #4285F4; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #app-content { display: none; } /* Hidden until logged in */
        .user-bar { text-align: center; margin-bottom: 15px; font-size: 0.9rem; color: #555; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-left: 10px; }

        /* Responsive Nav Tabs */
        .nav-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-tabs button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; background: #ddd; font-weight: bold; flex: 1; min-width: 80px; font-size: 0.9rem; }
        .nav-tabs button.active { background: #d35400; color: white; }
        
        .section { display: none; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 1100px; margin: 0 auto; }
        .section.active { display: block; }

        /* Billing Row Styles */
        .bill-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #f9f9f9; padding: 12px; border-radius: 5px; flex-wrap: wrap; }
        .bill-row select { flex: 2; min-width: 150px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .bill-row input { flex: 1; min-width: 60px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .remove-item { background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Controls */
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        @media (min-width: 600px) { .controls { flex-direction: row; } }
        button.add-btn { background: #3498db; color: white; border: none; padding: 15px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button.submit-btn { background: #27ae60; color: white; border: none; padding: 15px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; font-size: 1rem;}
        button.print-big-btn { background: #6c5ce7; color: white; border: none; padding: 15px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; font-size: 1rem;}
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Responsive Table */
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.9rem; }
        th { background: #f8f9fa; color: #2c3e50; }
        .print-btn { background: #6c5ce7; color: white; border: none; padding: 8px 12px; border-radius: 3px; cursor: pointer; margin-bottom: 5px; }
        .delete-btn { background: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 3px; cursor: pointer; }
        .grand-total-row { font-weight: bold; background-color: #ffeaa7 !important; }

        /* Print Styles */
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { position: absolute; left: 0; top: 0; width: 80mm; font-family: monospace; padding: 10px; color: black !important; }
            @media (max-width: 600px) {

    h1{
        font-size:1.4rem;
    }

    .bill-row{
        flex-direction:column;
        align-items:stretch;
    }

    .bill-row select,
    .bill-row input{
        width:100%;
    }

    .controls{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    table{
        font-size:0.8rem;
    }

}
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="background-color: black;">_<u>MOMO HOUSE - INVENTORY</u>_</h1>
        <p style="font-size: large;"><b>By Shibam Addya</b></p>
        <button class="google-btn" onclick="loginWithGoogle()">Sign in with Google</button>
    </div>

    <div id="app-content">
        <h1>MOMO HOUSE</h1>
        <div class="user-bar">
            Logged in as: <span id="user-email-display" style="font-weight: bold;"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="nav-tabs">
            <button id="tab-billing" class="active" onclick="switchTab('billing')">1. Billing</button>
            <button id="tab-storage" onclick="switchTab('storage')">2. Storage</button>
            <button id="tab-inventory" onclick="switchTab('inventory')">3. Inventory</button>
        </div>

        <div id="billing" class="section active">
            <h2>New Customer Bill</h2>
            <div id="billItemsContainer"></div>
            
            <div class="controls">
                <button class="add-btn" onclick="addBillRow()">+ Add Item</button>
                <button class="submit-btn" onclick="processFinalOrder()">Submit Order</button>
                <button id="printCurrentBtn" class="print-big-btn" onclick="printLastOrder()" disabled>Print Bill</button>
            </div>
            <p id="orderStatus" style="color: #27ae60; font-weight: bold; margin-top: 10px; text-align: center;"></p>
        </div>

        <div id="storage" class="section">
            <h2>Order Logs</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>#</th><th>Time</th><th>Items Sold</th><th>Invest</th><th>Sale</th><th>Profit</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="storageTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="inventory" class="section">
            <h2>Daily Inventory</h2>
            <div id="inventoryData" class="table-container"></div>
        </div>
    </div>

    <div id="receipt-print-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // ⚠️ PASTE YOUR FIREBASE CONFIG HERE ⚠️
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyBW7ER0s5aK3HFXpPNUwyK8pIcvR_PNRSc",
  authDomain: "moho-5dc4a.firebaseapp.com",
  projectId: "moho-5dc4a",
  storageBucket: "moho-5dc4a.firebasestorage.app",
  messagingSenderId: "703786739756",
  appId: "1:703786739756:web:2de935c9220449b3ca0989"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let allOrders = [];
        let unsubscribeOrders = null;
        let lastSubmittedOrderId = null;

        const products = {
            "VEG - STEAM": { sale: 35, cost: 20 }, "VEG - FRIED": { sale: 40, cost: 22 }, "VEG - PANFRIED": { sale: 50, cost: 25 },
            "CORN CHEESE - STEAM": { sale: 45, cost: 30 }, "CORN CHEESE - FRIED": { sale: 50, cost: 32 }, "CORN CHEESE - PANFRIED": { sale: 55, cost: 35 },
            "CHICKEN - STEAM": { sale: 50, cost: 25 }, "CHICKEN - FRIED": { sale: 55, cost: 27 }, "CHICKEN - PANFRIED": { sale: 60, cost: 30 },
            "CH. CHEESE - STEAM": { sale: 55, cost: 30 }, "CH. CHEESE - FRIED": { sale: 60, cost: 30 }, "CH. CHEESE - PANFRIED": { sale: 65, cost: 30 },
            "SHEZWAN MOMO": { sale: 60, cost: 20 }, "GONDHORAJ MOMO": { sale: 60, cost: 25 }, "KABIRAJI MOMO": { sale: 70, cost: 30 },
            "KURKURE MOMO": { sale: 80, cost: 40 }, "KOREAN CHILLI MOMO": { sale: 80, cost: 50 }, "AFGANI MOMO": { sale: 90, cost: 50 },
            "MAKHANI MOMO": { sale: 90, cost: 50 }, "JHOL MOMO [8PC]": { sale: 100, cost: 32 },
            "FRENCH FRIES SALTED [R]": { sale: 50, cost: 15 }, "FRENCH FRIES SALTED [L]": { sale: 100, cost: 30 },
            "FRENCH FRIES PERI-PERI [R]": { sale: 55, cost: 20 }, "FRENCH FRIES PERI-PERI [L]": { sale: 110, cost: 40 },
            "COLD DRINK": { sale: 10, cost: 8 }
        };

        // --- AUTHENTICATION LOGIC ---
        // --- AUTHENTICATION LOGIC (Mobile Safe) ---
import { signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

window.loginWithGoogle = async () => {
    try {
        // Try popup first (best for desktop)
        await signInWithPopup(auth, provider);
    } catch (error) {
        console.log("Popup failed, switching to redirect login...");
        // Mobile fallback
        await signInWithRedirect(auth, provider);
    }
};

// Handle redirect result (for mobile login)
getRedirectResult(auth)
.then((result) => {
    if (result && result.user) {
        console.log("Redirect login successful");
    }
})
.catch((error) => {
    console.error("Redirect login error:", error);
});

        window.logout = () => {
            signOut(auth);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('user-email-display').innerText = user.email;
                fetchLiveOrders(); // Start listening to cloud database
                if(document.getElementById('billItemsContainer').children.length === 0) window.addBillRow();
            } else {
                currentUser = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
                if (unsubscribeOrders) unsubscribeOrders(); // Stop listening
            }
        });

        // --- CLOUD DATABASE LOGIC ---
        function fetchLiveOrders() {
            if (!currentUser) return;
            // Listen to orders specific to the logged-in user, ordered by creation time
            const ordersRef = collection(db, "users", currentUser.uid, "orders");
            const q = query(ordersRef, orderBy("id", "asc"));
            
            unsubscribeOrders = onSnapshot(q, (snapshot) => {
                allOrders = [];
                snapshot.forEach((doc) => {
                    let orderData = doc.data();
                    orderData.firestoreId = doc.id; // Save unique cloud ID for deletion
                    allOrders.push(orderData);
                });
                refreshUI(); // Re-draw tables automatically when another device adds/deletes data!
            });
        }

        // --- APP LOGIC (Exposed to window object for HTML onclick to find them) ---
        window.switchTab = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
            if(id !== 'billing') refreshUI();
        }

        window.addBillRow = () => {
            const container = document.getElementById('billItemsContainer');
            const row = document.createElement('div');
            row.className = 'bill-row';
            let options = Object.keys(products).map(p => `<option value="${p}">${p} (₹${products[p].sale})</option>`).join('');
            row.innerHTML = `
                <select class="item-sel">${options}</select>
                <input type="number" class="item-qty" value="1" min="1">
                <button class="remove-item" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
            document.getElementById('printCurrentBtn').disabled = true;
            document.getElementById('orderStatus').innerText = "";
        }

        window.processFinalOrder = async () => {
            if (!currentUser) return alert("You must be logged in!");
            const rows = document.querySelectorAll('.bill-row');
            if (rows.length === 0) return alert("Please add at least one item!");
            
            const now = new Date();
            const dateKey = now.toLocaleDateString();
            const todayOrders = allOrders.filter(o => o.date === dateKey);
            const orderNo = todayOrders.length + 1;
            
            let orderItems = [];
            let orderTotalInvest = 0;
            let orderTotalSale = 0;
            
            rows.forEach(row => {
                const name = row.querySelector('.item-sel').value;
                const qty = parseInt(row.querySelector('.item-qty').value);
                const data = products[name];
                const invest = data.cost * qty;
                const sale = data.sale * qty;
                orderItems.push({ name, qty, invest, sale, rate: data.sale });
                orderTotalInvest += invest;
                orderTotalSale += sale;
            });

            lastSubmittedOrderId = Date.now();
            const newOrder = {
                id: lastSubmittedOrderId,
                orderNo: orderNo,
                date: dateKey,
                time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                items: orderItems,
                totalInvest: orderTotalInvest,
                totalSale: orderTotalSale,
                totalProfit: orderTotalSale - orderTotalInvest
            };

            // SAVE TO FIREBASE INSTEAD OF LOCAL STORAGE
            try {
                const ordersRef = collection(db, "users", currentUser.uid, "orders");
                await addDoc(ordersRef, newOrder);
                document.getElementById('orderStatus').innerText = "Order #" + orderNo + " Saved to Cloud!";
                document.getElementById('printCurrentBtn').disabled = false;
            } catch (error) {
                alert("Error saving order: " + error.message);
            }
        }

        window.printLastOrder = () => {
            if (lastSubmittedOrderId) {
                window.printOrder(lastSubmittedOrderId);
                document.getElementById('billItemsContainer').innerHTML = '';
                window.addBillRow();
                document.getElementById('printCurrentBtn').disabled = true;
                document.getElementById('orderStatus').innerText = "";
            }
        }

        window.printOrder = (id) => {
            const order = allOrders.find(o => o.id === id);
            if (!order) return;
            const printArea = document.getElementById('receipt-print-area');
            let itemsHtml = order.items.map(i => 
                `<div>${i.name}</div>
                 <div style="display:flex; justify-content:space-between;">
                    <span>${i.qty} x ${i.rate}</span> <span>₹${i.sale}</span>
                 </div>`
            ).join('<hr style="border:0.5px dashed #ccc">');
            printArea.innerHTML = `
                <div style="text-align:center;">
                    <strong style="font-size:1.2rem;">MOMO HOUSE</strong><br>
                    Order #${order.orderNo}<br>
                    ${order.date} | ${order.time}<br>
                    ----------------------------
                </div>
                <div style="margin:10px 0;">${itemsHtml}</div>
                <div style="text-align:right; border-top:1px solid #000; padding-top:5px;">
                    <strong>GRAND TOTAL: ₹${order.totalSale}</strong>
                </div>
                <div style="text-align:center; margin-top:10px; font-size:0.8rem;">
                    Thank You! Visit Again.
                </div>
            `;
            window.print();
        }

        window.deleteOrder = async (firestoreId) => {
            if(confirm("Delete this order from the cloud?")) {
                try {
                    await deleteDoc(doc(db, "users", currentUser.uid, "orders", firestoreId));
                    // No need to manually refreshUI or update local arrays; 
                    // onSnapshot automatically detects the deletion and updates everything!
                } catch (error) {
                    alert("Error deleting: " + error.message);
                }
            }
        }

        function refreshUI() {
            const body = document.getElementById('storageTableBody');
            body.innerHTML = '';
            // Display newest first
            allOrders.slice().reverse().forEach(o => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${o.orderNo}</td>
                    <td>${o.time}</td>
                    <td>${o.items.map(i => `${i.qty}x ${i.name}`).join(', ')}</td>
                    <td>${o.totalInvest}</td>
                    <td>${o.totalSale}</td>
                    <td style="color:green; font-weight:bold">${o.totalProfit}</td>
                    <td>
                        <button class="print-btn" onclick="printOrder(${o.id})">Print</button>
                        <button class="delete-btn" onclick="deleteOrder('${o.firestoreId}')">Delete</button>
                    </td>
                `;
                body.appendChild(tr);
            });

            const invDiv = document.getElementById('inventoryData');
            invDiv.innerHTML = '';
            const daily = {};
            allOrders.forEach(o => {
                if (!daily[o.date]) daily[o.date] = { items: {}, invest: 0, sale: 0, profit: 0 };
                o.items.forEach(i => {
                    if (!daily[o.date].items[i.name]) daily[o.date].items[i.name] = { qty: 0, invest: 0, sale: 0 };
                    daily[o.date].items[i.name].qty += i.qty;
                    daily[o.date].items[i.name].invest += i.invest;
                    daily[o.date].items[i.name].sale += i.sale;
                });
                daily[o.date].invest += o.totalInvest;
                daily[o.date].sale += o.totalSale;
                daily[o.date].profit += (o.totalSale - o.totalInvest);
            });
            Object.keys(daily).sort((a,b) => new Date(b) - new Date(a)).forEach(date => {
                let html = `<h3>Summary: ${date}</h3><table>
                    <tr><th>Item</th><th>Qty</th><th>Inv.</th><th>Sale</th><th>Profit</th></tr>`;
                for (let item in daily[date].items) {
                    let d = daily[date].items[item];
                    html += `<tr><td>${item}</td><td>${d.qty}</td><td>${d.invest}</td><td>${d.sale}</td><td>${d.sale - d.invest}</td></tr>`;
                }
                html += `<tr class="grand-total-row"><td>TOTAL</td><td>-</td><td>₹${daily[date].invest}</td><td>₹${daily[date].sale}</td><td>₹${daily[date].profit}</td></tr></table>`;
                invDiv.innerHTML += html;
            });
        }
    </script>
</body>
</html>
